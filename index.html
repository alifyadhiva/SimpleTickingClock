<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 120px;
      height: 45px;
      background: transparent;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .clock-card {
      width: 120px;
      height: 45px;
      background: #ffffff;
      box-sizing: border-box;
      padding: 4px 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .time-row {
      display: flex;
      align-items: baseline;
      justify-content: center;
      width: 100%;
      white-space: nowrap;
      line-height: 1;
    }

    .time {
      font-size: 20px;
      font-weight: 700;
      color: #1565d8;
      letter-spacing: -0.4px;
    }

    .zone {
      font-size: 20px;
      font-weight: 700;
      color: #1565d8;
      margin-left: 3px;
    }

    .date {
      font-size: 12px;
      color: #5d6b7a;
      line-height: 1;
      margin-top: 4px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="clock-card">
    <div class="time-row">
      <span class="time" id="time">--:--:--</span>
      <span class="zone">WIB</span>
    </div>
    <div class="date" id="date">-- --- ----</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();

      const time = new Intl.DateTimeFormat("en-GB", {
        timeZone: "Asia/Jakarta",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(now);

      const date = new Intl.DateTimeFormat("en-GB", {
        timeZone: "Asia/Jakarta",
        day: "2-digit",
        month: "short",
        year: "numeric"
      }).format(now);

      document.getElementById("time").textContent = time;
      document.getElementById("date").textContent = date;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
