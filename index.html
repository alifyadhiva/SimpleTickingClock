<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .clock-card {
      width: 120px;
      height: 45px;
      border: 1px solid #c9d9ee;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.10);
      box-sizing: border-box;
      padding: 5px 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow: hidden;
    }

    .label {
      font-size: 7px;
      color: #4b5d73;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 3px;
      white-space: nowrap;
    }

    .time {
      font-size: 16px;
      font-weight: 700;
      color: #1565d8;
      line-height: 1;
      margin-bottom: 3px;
      white-space: nowrap;
      letter-spacing: -0.4px;
    }

    .date {
      font-size: 7px;
      color: #5d6b7a;
      line-height: 1;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="clock-card">
    <div class="label">Site Time</div>
    <div class="time" id="time">--:--:--</div>
    <div class="date" id="date">Loading...</div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();

      const time = new Intl.DateTimeFormat("en-GB", {
        timeZone: "Asia/Jakarta",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(now);

      const date = new Intl.DateTimeFormat("en-GB", {
        timeZone: "Asia/Jakarta",
        day: "2-digit",
        month: "short",
        year: "numeric"
      }).format(now);

      document.getElementById("time").textContent = time + " WIB";
      document.getElementById("date").textContent = date;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
